spring.application.name=book_media_store

# MySQL — database name: bookmediastore (default port 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/bookmediastore?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root

# JPA + Flyway: schema is managed by Flyway migrations (src/main/resources/db/migration)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false
