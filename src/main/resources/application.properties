# Général
spring.application.name=book_media_store
spring.application.frontend-url=http://localhost:3000

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:8889/bookmediastore
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway - désactivé si aucune dépendance Flyway (sinon ajouter les migrations)
spring.flyway.enabled=false

# JWT
app.jwt.secret=bookeastoresecretkey1234567890abcdef
app.jwt.expiration=86400000

# Sécurité & Uploads
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Logs
logging.level.org.springframework.security=INFO
