# Général
spring.application.name=book_media_store
spring.application.frontend-url=http://localhost:3000

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bookmediastore?createDatabaseIfNotExist=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# IMPORTANT : On met "validate" car c'est Flyway qui crée les tables. 
# Hibernate vérifie juste que tes entités Java correspondent bien à la BDD.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway - Gestion des migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Sécurité & Uploads (pour les avatars de ta roadmap)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Logs (utile pour débugger tes futurs fetch)
logging.level.org.springframework.security=INFO
logging.level.be.event.smartbooking=DEBUG